<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión / Registrarse</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #f4f4f4;
        margin: 0;
      }
      .container {
        background-color: #fff;
        padding: 40px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        text-align: center;
        width: 350px;
      }
      h1 {
        color: #333;
        margin-bottom: 25px;
      }
      .google-btn {
        display: inline-block;
        background-color: #4285f4;
        color: white;
        padding: 12px 25px;
        border-radius: 5px;
        text-decoration: none;
        font-size: 16px;
        font-weight: bold;
        transition: background-color 0.3s ease;
        margin-bottom: 20px;
        width: 80%; /* Hacer el botón más ancho */
        box-sizing: border-box;
      }
      .google-btn:hover {
        background-color: #357ae8;
      }
      .google-icon {
        vertical-align: middle;
        margin-right: 10px;
        width: 20px;
      }
      form {
        margin-top: 20px;
      }
      input[type='email'],
      input[type='password'] {
        width: calc(100% - 22px);
        padding: 10px;
        margin-bottom: 15px;
        border: 1px solid #ddd;
        border-radius: 4px;
      }
      button {
        background-color: #28a745;
        color: white;
        padding: 12px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        width: 100%;
        transition: background-color 0.3s ease;
      }
      button:hover {
        background-color: #218838;
      }
      .message {
        margin-top: 15px;
        font-size: 0.9em;
        color: #555;
      }
      .error {
        color: red;
      }
      .success {
        color: green;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Acceso a la API de Conversión</h1>

      <a href="/auth/google" class="google-btn">
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/4/4a/Logo_of_Google_G_Suite.svg"
          alt="Google logo"
          class="google-icon"
        />
        Iniciar Sesión con Google
      </a>

      <p>— O —</p>

      <form id="authForm">
        <input
          type="email"
          id="email"
          placeholder="Email"
          required
          autocomplete="username"
        />
        <input
          type="password"
          id="password"
          placeholder="Contraseña"
          required
          autocomplete="current-password"
        />
        <button type="submit" id="loginButton">Iniciar Sesión</button>
        <button type="button" id="registerButton" style="background-color: #007bff; margin-top: 10px;">
          Registrarse
        </button>
      </form>
      <p id="message" class="message"></p>
    </div>

    <script>
      document
        .getElementById('authForm')
        .addEventListener('submit', async (e) => {
          e.preventDefault();
          const email = document.getElementById('email').value;
          const password = document.getElementById('password').value;
          const messageElement = document.getElementById('message');
          messageElement.textContent = '';
          messageElement.className = 'message';

          try {
            const response = await fetch('/auth/local-login', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({ email, password }),
            });

            const data = await response.json();

            if (response.ok) {
              messageElement.textContent = data.message;
              messageElement.classList.add('success');
              if (data.redirect) {
                window.location.href = data.redirect;
              }
            } else {
              messageElement.textContent =
                data.message || 'Error al iniciar sesión.';
              messageElement.classList.add('error');
            }
          } catch (error) {
            console.error('Error:', error);
            messageElement.textContent = 'Error de red o del servidor.';
            messageElement.classList.add('error');
          }
        });

      document
        .getElementById('registerButton')
        .addEventListener('click', async () => {
          const email = document.getElementById('email').value;
          const password = document.getElementById('password').value;
          const messageElement = document.getElementById('message');
          messageElement.textContent = '';
          messageElement.className = 'message';

          try {
            const response = await fetch('/auth/register', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({ email, password }),
            });

            const data = await response.json();

            if (response.ok) {
              messageElement.textContent =
                data.message + ' Ahora puedes iniciar sesión.';
              messageElement.classList.add('success');
              // Opcional: limpiar campos o redirigir
            } else {
              messageElement.textContent =
                data.message || 'Error al registrar usuario.';
              messageElement.classList.add('error');
            }
          } catch (error) {
            console.error('Error:', error);
            messageElement.textContent = 'Error de red o del servidor.';
            messageElement.classList.add('error');
          }
        });
    </script>
  </body>
</html>
